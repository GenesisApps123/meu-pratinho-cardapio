<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>MEU PRATINHO - ALMOÇO</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>MEU PRATINHO - ALMOÇO</h1>
</header>

<div class="container">

<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="endereco" placeholder="Seu endereço">

<h2>Guarnição</h2>
<select id="guarnicao">
  <option>Arroz branco</option>
  <option>Baião de dois normal</option>
  <option>Baião de dois cremoso</option>
</select>

<h2>Misturas (até 2 grátis)</h2>
<div class="options">
  <label><input type="checkbox" class="mistura" value="Parmegiana de frango"> Parmegiana de frango</label>
  <label><input type="checkbox" class="mistura" value="Porco no molho"> Porco no molho</label>
  <label><input type="checkbox" class="mistura" value="Sobrecoxa Barbecue"> Sobrecoxa Barbecue</label>
  <label><input type="checkbox" class="mistura" value="Ovo frito"> Ovo frito</label>
  <label><input type="checkbox" class="mistura" value="Queijo frito"> Queijo frito</label>
  <label><input type="checkbox" class="mistura" value="Calabresa frita"> Calabresa frita</label>
</div>

<h2>Adicionais (grátis)</h2>
<div class="options">
  <label><input type="checkbox" class="extra" value="Farofa"> Farofa</label>
  <label><input type="checkbox" class="extra" value="Salada"> Salada</label>
  <label><input type="checkbox" class="extra" value="Macarrão"> Macarrão</label>
  <label><input type="checkbox" class="extra" value="Chips de macaxeira"> Chips de macaxeira</label>
  <label><input type="checkbox" class="extra" value="Batata frita"> Batata frita</label>
  <label><input type="checkbox" class="extra" value="Cuscuz"> Cuscuz</label>
</div>

<h2>Refrigerante</h2>
<div class="options">
  <label><input type="checkbox" class="refri" value="Coca lata" data-preco="4.99"> Coca lata R$4,99</label>
  <label><input type="checkbox" class="refri" value="Cajuína lata" data-preco="4.99"> Cajuína lata R$4,99</label>
  <label><input type="checkbox" class="refri" value="Coca Zero lata" data-preco="4.99"> Coca Zero R$4,99</label>
  <label><input type="checkbox" class="refri" value="Coca 1L" data-preco="9.99"> Coca 1L R$9,99</label>
  <label><input type="checkbox" class="refri" value="Cajuína 1L" data-preco="9.99"> Cajuína 1L R$9,99</label>
  <label><input type="checkbox" class="refri" value="Coca 2L" data-preco="14.99"> Coca 2L R$14,99</label>
</div>

<h2>Pagamento</h2>
<select id="pagamento">
  <option>Dinheiro</option>
  <option>Pix</option>
  <option>Cartão</option>
</select>

<button onclick="enviarPedido()">Finalizar Pedido</button>

</div>

<script src="script.js"></script>
</body>
</html>
