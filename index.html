<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEU PRATINHO - ALMOÇO</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <p class="subtitulo">MONTE SEU ALMOÇO</p>
</header>

<div class="container">

<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="endereco" placeholder="Seu endereço">

<!-- GUARNIÇÃO -->
<div class="card">
<h2>Guarnição</h2>
<select id="guarnicao">
  <option>Arroz branco</option>
  <option>Baião de dois</option>
  <option>Baião cremoso</option>
</select>
</div>

<!-- MISTURAS -->
<div class="card">
<h2>Escolha até 2 misturas</h2>

<label class="check">
<input type="checkbox" class="mistura" value="Panqueca de carne">
<span></span>Panqueca de carne
</label>

<label class="check">
<input type="checkbox" class="mistura" value="Fígado acebolado">
<span></span>Fígado acebolado
</label>

<label class="check">
<input type="checkbox" class="mistura" value="Costelinha suína Barbecue">
<span></span>Costelinha suína Barbecue
</label>

<label class="check">
<input type="checkbox" class="mistura" value="Ovo frito">
<span></span>Ovo frito
</label>

<label class="check">
<input type="checkbox" class="mistura" value="Queijo frito">
<span></span>Queijo frito
</label>

<label class="check">
<input type="checkbox" class="mistura" value="Calabresa frita">
<span></span>Calabresa frita
</label>

<p class="obs">+ R$3,99 por mistura extra</p>
</div>

<!-- ADICIONAIS -->
<div class="card">
<h2>Adicionais grátis</h2>

<label class="check"><input type="checkbox" class="extra" value="Farofa"><span></span>Farofa</label>
<label class="check"><input type="checkbox" class="extra" value="Salada"><span></span>Salada</label>
<label class="check"><input type="checkbox" class="extra" value="Macarrão"><span></span>Macarrão</label>
<label class="check"><input type="checkbox" class="extra" value="Chips"><span></span>Chips</label>
<label class="check"><input type="checkbox" class="extra" value="Batata frita"><span></span>Batata frita</label>
<label class="check"><input type="checkbox" class="extra" value="Cuscuz"><span></span>Cuscuz</label>

</div>

<!-- REFRI -->
<div class="card">
<h2>Refrigerantes</h2>

<label class="check"><input type="checkbox" class="refri" data-preco="4.99" value="Coca lata"><span></span>Coca lata R$4,99</label>
<label class="check"><input type="checkbox" class="refri" data-preco="4.99" value="Cajuína lata"><span></span>Cajuína lata R$4,99</label>
<label class="check"><input type="checkbox" class="refri" data-preco="9.99" value="Coca 1L"><span></span>Coca 1L R$9,99</label>
<label class="check"><input type="checkbox" class="refri" data-preco="14.99" value="Coca 2L"><span></span>Coca 2L R$14,99</label>

</div>

<!-- PAGAMENTO -->
<div class="card">
<h2>Pagamento</h2>
<select id="pagamento">
<option>Dinheiro</option>
<option>Pix</option>
<option>Cartão</option>
</select>
</div>

<!-- TOTAL FIXO -->
<div class="total-box">
Total: <span id="total">R$ 14,99</span>
</div>

<button onclick="finalizar()">Finalizar Pedido</button>

</div>

<script src="script.js"></script>
</body>
</html>
